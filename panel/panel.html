<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Health Claim Verifier</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      padding: 16px;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #1d4ed8;
      color: #fff;
      border-color: transparent;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
    }
    #error {
      margin-top: 12px;
      font-size: 13px;
      color: #b91c1c;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <h1>Health Claim Verifier</h1>
  <button id="analyseBtn">Analyse this article</button>
  <p id="status" hidden>Analysing…</p>
  <p id="error" hidden></p>
  <script src="panel.js"></script>
</body>
</html>
